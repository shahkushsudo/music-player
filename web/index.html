<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Music Player </title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="dragOverlay" class="drag-overlay">
        <div class="drag-overlay-content">
            <div class="drag-icon">♫</div>
            <div class="drag-text">Drop your music here</div>
        </div>
    </div>
    <div class="app-container">
        <!-- LEFT SIDEBAR -->
        <aside class="sidebar-left">
            <div class="sidebar-header">
                <h2><span class="icon">♫</span> Local Music Player</h2>
            </div>

            <button id="addMusicBtn" class="btn-primary">Add Music</button>
            <input type="file" id="fileInput" accept=".mp3" multiple hidden>

            <div class="sidebar-section">
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Search by title or artist...">
                </div>
                <h3>Library</h3>
                <div id="sidebarList" class="track-list"></div>
            </div>

            <div class="sidebar-section">
                <h3>Liked Songs</h3>
                <div id="likedSidebarList" class="track-list"></div>
            </div>
        </aside>

        <!-- MAIN PANEL -->
        <main class="main-panel">
            <div class="main-header">
                <div class="header-filters">
                    <label>Sort by:</label>
                    <select id="sortSelect" class="styled-select">
                        <option value="recently_added">Recently Added</option>
                        <option value="most_played">Most Played</option>
                        <option value="name_az">Name A-Z</option>
                    </select>
                </div>
            </div>

            <div id="libraryCount" class="library-count"></div>
            <div class="list-header row-header">
                <div class="col-hash">#</div>
                <div class="col-art"></div>
                <div class="col-title">Title</div>
                <div class="col-artist">Artist</div>
                <div class="col-duration">Time</div>
            </div>
            <div id="emptyState" class="empty-state">
                <div class="empty-icon">♫</div>
                <div class="empty-title">No music yet</div>
                <div class="empty-sub">Click "Add Music" or drop MP3 files here to get started</div>
            </div>
            <div id="mainSongList" class="main-song-list">
                <!-- Song rows here -->
            </div>
        </main>

        <!-- RIGHT SIDEBAR -->
        <aside class="sidebar-right">
            <div class="sidebar-header">
                <h2>Queue</h2>
                <span id="queueCount" class="queue-count">0 songs</span>
            </div>
            <div id="nowPlayingPanel" class="now-playing-panel" style="display:none;">
                <div class="now-playing-label">NOW PLAYING</div>
                <div class="now-playing-item">
                    <div id="npArt" class="sidebar-art">♫</div>
                    <div class="sidebar-info">
                        <div id="npTitle" class="sidebar-title"></div>
                        <div id="npArtist" class="sidebar-artist"></div>
                    </div>
                </div>
            </div>
            <div id="queueList" class="queue-list"></div>
        </aside>
    </div>

    <!-- BOTTOM PLAYER BAR -->
    <div class="player-bar">
        <div class="player-left">
            <div id="playerArt" class="player-art">♫</div>
            <div class="player-info">
                <div id="playerTitle" class="player-title">No song playing</div>
                <div id="playerArtist" class="player-artist">Unknown Artist</div>
            </div>
        </div>

        <div class="player-center">
            <div class="player-controls">
                <button id="btnShuffle" class="control-btn shuffle-btn" title="Shuffle">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 3 21 3 21 8"></polyline>
                        <line x1="4" y1="20" x2="21" y2="3"></line>
                        <polyline points="21 16 21 21 16 21"></polyline>
                        <line x1="15" y1="15" x2="21" y2="21"></line>
                    </svg>
                </button>
                <button id="btnPrev" class="control-btn" title="Previous">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="19 20 9 12 19 4 19 20"></polygon>
                        <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"></line>
                    </svg>
                </button>
                <button id="btnPlay" class="control-btn play-btn" title="Play/Pause">
                    <svg id="playIcon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                </button>
                <button id="btnNext" class="control-btn" title="Next">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="5 4 15 12 5 20 5 4"></polygon>
                        <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"></line>
                    </svg>
                </button>
                <button id="btnRepeat" class="control-btn repeat-btn" title="Repeat">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="17 1 21 5 17 9"></polyline>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <polyline points="7 23 3 19 7 15"></polyline>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                    </svg>
                </button>
            </div>
            <div class="playback-bar">
                <span id="currentTime" class="time-label">0:00</span>
                <div id="seekBar" class="progress-container">
                    <div id="seekProgress" class="progress-fill"></div>
                    <div id="visualizer" class="visualizer">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                </div>
                <span id="totalTime" class="time-label">0:00</span>
            </div>
        </div>

        <div class="player-right">
            <button class="control-btn" title="Volume">🔊</button>
            <div class="volume-container">
                <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="100">
                <div id="volumeProgress" class="progress-fill volume-fill"></div>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="contextMenu" class="context-menu">
        <div class="cm-item" id="cmPlayNext">Play Next</div>
        <div class="cm-item" id="cmAddQueue">Add to Queue</div>
    </div>

    <!-- jsmediatags CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
